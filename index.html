<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台中旅遊誌｜自適應版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #faf6f0;
            --brown: #6d4c41;
            --orange: #d87d4a;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--cream);
            color: #333;
            font-family: 'Noto Serif TC', serif;
            overflow-x: hidden;
        }

        /* --- 自適應 Header --- */
        header {
            padding: 8vh 5%;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: white;
            text-align: center;
        }

        h1 { font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }

        /* --- 自適應 導航列 --- */
        nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #ddd;
        }

        .nav-btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--brown);
            border: none;
            background: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-btn.active { color: var(--orange); border-bottom: 3px solid var(--orange); }

        /* --- 核心自適應容器 (關鍵在此！) --- */
        main {
            max-width: 1200px; /* 電腦版最大寬度 */
            margin: 0 auto;
            padding: 20px;
        }

        .section { display: none; }
        .section.active { display: grid; gap: 20px; }

        /* 預設手機版：單欄 */
        @media (min-width: 0px) {
            .section.active { grid-template-columns: 1fr; }
        }

        /* 平板版：雙欄 */
        @media (min-width: 768px) {
            .section.active { grid-template-columns: repeat(2, 1fr); }
        }

        /* 電腦大螢幕：三欄 */
        @media (min-width: 1024px) {
            .section.active { grid-template-columns: repeat(3, 1fr); }
        }

        /* --- 卡片設計 --- */
        .card {
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-content h3 { font-size: 1.3rem; margin-bottom: 10px; color: var(--brown); }
        .card-content p { font-size: 0.95rem; color: #666; flex-grow: 1; }

        footer { text-align: center; padding: 50px 20px; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>台中旅遊誌</h1>
    <p>探索最美的台中景色</p>
</header>

<nav>
    <button class="nav-btn active" onclick="showTab('food', this)">在地美食</button>
    <button class="nav-btn" onclick="showTab('spots', this)">熱門景點</button>
</nav>

<main>
    <div id="food" class="section active">
        <div class="card">
            <img src="https://utility.displayimage.taichung.gov.tw/Utility/DisplayImage?id=25381">
            <div class="card-content">
                <h3>太陽餅</h3>
                <p>純手工酥皮與香甜麥芽糖的經典組合。</p>
            </div>
        </div>
        <div class="card">
            <img src="https://www.chunshuitang.com.tw/upload/article_m/ALL_article_[C]_24E24_pFKFEXUAKh.webp">
            <div class="card-content">
                <h3>珍珠奶茶</h3>
                <p>世界聞名的台灣國飲，發源於台中。</p>
            </div>
        </div>
    </div>

    <div id="spots" class="section">
        <div class="card">
            <img src="https://travel.taichung.gov.tw/image/24379/1024x768">
            <div class="card-content">
                <h3>國家歌劇院</h3>
                <p>伊東豊雄設計的建築奇蹟。</p>
            </div>
        </div>
        <div class="card">
            <img src="https://travel.taichung.gov.tw/Utility/DisplayImage?id=25574">
            <div class="card-content">
                <h3>高美濕地</h3>
                <p>全台灣最美的夕陽與木棧道。</p>
            </div>
        </div>
    </div>
</main>

<footer>© 2026 台中旅遊誌 · 適應所有裝置版</footer>

<script>
    function showTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
</script>

</body>
</html>
