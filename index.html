<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台中旅遊誌</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #faf6f0;
            --brown: #6d4c41;
            --orange: #d87d4a;
            --dark: #2c2c2c;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--cream);
            color: var(--dark);
            font-family: 'Noto Serif TC', serif;
            line-height: 1.6;
        }

        /* 標題區加大 */
        header {
            padding: 60px 25px 30px;
            background: linear-gradient(to bottom, #f3e5f5, var(--cream));
            text-align: left;
        }

        h1 {
            font-size: 2.5rem; /* 更大的標題 */
            font-weight: 900;
            color: var(--brown);
            letter-spacing: -1px;
            line-height: 1.2;
        }

        h1 span {
            display: block;
            font-size: 1.2rem;
            color: var(--orange);
            margin-top: 8px;
            letter-spacing: 2px;
        }

        /* 導航列優化：點擊區域更大 */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250, 246, 240, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            border-bottom: 1px solid #eee;
        }

        .nav-btn {
            flex: 1;
            padding: 18px 0;
            border: none;
            background: none;
            font-size: 1.05rem;
            font-weight: 600;
            color: #888;
            cursor: pointer;
        }

        .nav-btn.active {
            color: var(--orange);
            border-bottom: 3px solid var(--orange);
        }

        /* 內容卡片優化 */
        main {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .card img {
            width: 100%;
            height: 220px; /* 固定高度，看起來更整齊 */
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
        }

        .card-content h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: var(--brown);
        }

        .card-content p {
            font-size: 1rem; /* 加大內文字體 */
            color: #555;
            text-align: justify;
        }

        footer {
            text-align: center;
            padding: 40px 20px calc(40px + var(--safe-bottom));
            font-size: 0.9rem;
            color: #bbb;
        }

        /* 針對小螢幕微調 */
        @media (max-width: 375px) {
            h1 { font-size: 2.1rem; }
            .card img { height: 180px; }
        }
    </style>
</head>
<body>

<header>
    <h1>台中旅遊誌<span>SCENERY & FOOD</span></h1>
</header>

<nav>
    <button class="nav-btn active" onclick="showTab('food', this)">在地美食</button>
    <button class="nav-btn" onclick="showTab('spots', this)">熱門景點</button>
</nav>

<main>
    <div id="food" class="section active">
        <div class="card">
            <img src="https://utility.displayimage.taichung.gov.tw/Utility/DisplayImage?id=25381" alt="太陽餅">
            <div class="card-content">
                <h3>太陽餅</h3>
                <p>台中最知名的伴手禮，酥脆的外皮配上香甜麥芽餡，是每位遊客必帶的美味。</p>
            </div>
        </div>
        <div class="card">
            <img src="https://www.chunshuitang.com.tw/upload/article_m/ALL_article_[C]_24E24_pFKFEXUAKh.webp" alt="珍奶">
            <div class="card-content">
                <h3>珍珠奶茶</h3>
                <p>起源於台中的春水堂，珍奶已成為台灣的國民飲料，茶香與Q彈珍珠的完美結合。</p>
            </div>
        </div>
    </div>

    <div id="spots" class="section">
        <div class="card">
            <img src="https://travel.taichung.gov.tw/image/24379/1024x768" alt="歌劇院">
            <div class="card-content">
                <h3>台中國家歌劇院</h3>
                <p>世界建築奇蹟，無樑柱的曲牆設計讓人驚嘆，是文青必訪的拍照聖地。</p>
            </div>
        </div>
        <div class="card">
            <img src="https://travel.taichung.gov.tw/Utility/DisplayImage?id=25574" alt="高美濕地">
            <div class="card-content">
                <h3>高美濕地</h3>
                <p>絕美日落與豐富生態，走在木棧道上迎接晚霞，是台中最浪漫的景點。</p>
            </div>
        </div>
    </div>
</main>

<footer>
    © 2026 台中旅遊誌 · 看風景 放輕鬆
</footer>

<script>
    function showTab(id, btn) {
        // 切換 Section
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        // 切換按鈕樣式
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // 自動回捲到上方，體驗更好
        window.scrollTo({ top: 150, behavior: 'smooth' });
    }
</script>

</body>
</html>
